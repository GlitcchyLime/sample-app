apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
  namespace: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: production-deployment
  template:
    metadata:
      labels:
        app: production-deployment
    spec:
      containers:
      - name: container-image
        image: us-east4-docker.pkg.dev/qwiklabs-gcp-04-d41e8146d690/my-repository/sample-app:v1.0
        ports:
        - containerPort: 8080
