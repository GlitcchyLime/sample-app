apiVersion: apps/v1
kind: Deployment
metadata:
  name: development-deployment
  namespace: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      app: development-deployment
  template:
    metadata:
      labels:
        app: development-deployment
    spec:
      containers:
      - name: container-image
        image: us-east4-docker.pkg.dev/qwiklabs-gcp-04-d41e8146d690/my-repository/hello-cloudbuild-dev:v1.0
        ports:
        - containerPort: 8080
