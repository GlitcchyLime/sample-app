steps:
# Step 1: Build the image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-east4-docker.pkg.dev/$PROJECT_ID/my-repository/hello-cloudbuild-dev:v1.0', '.']

# Step 2: Push the image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-east4-docker.pkg.dev/$PROJECT_ID/my-repository/hello-cloudbuild-dev:v1.0']

# Step 3: Deploy to GKE
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'container'
  - 'clusters'
  - 'get-credentials'
  - 'hello-cluster'
  - '--zone'
  - 'us-east4-c'
- name: 'gcr.io/cloud-builders/kubectl'
  args:
  - 'apply'
  - '-f'
  - 'dev/deployment.yaml'
  - '--namespace'
  - 'dev'

# Add this block to fix the Logging error
options:
  logging: CLOUD_LOGGING_ONLY
